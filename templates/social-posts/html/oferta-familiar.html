<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
  .card {
    width: 1080px; height: 1080px;
    background: linear-gradient(145deg, #1a1a1a 0%, #2d0000 50%, {{brandColor}} 100%);
    display: flex; flex-direction: column; position: relative;
  }
  .top-bar { background: {{brandColor}}; padding: 20px 40px; display: flex; align-items: center; gap: 20px; }
  .logo { width: 80px; height: 80px; border-radius: 50%; background: #fff; object-fit: contain; padding: 8px; }
  .branch { color: #fff; font-size: 28px; font-weight: 700; }
  .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
  .badge { background: #f5a623; color: #1a1a1a; font-size: 32px; font-weight: 900; padding: 12px 40px; border-radius: 50px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
  .title { color: #fff; font-size: 72px; font-weight: 900; text-align: center; line-height: 1.1; text-shadow: 3px 3px 0 #000; margin-bottom: 20px; }
  .price { color: #f5a623; font-size: 96px; font-weight: 900; text-shadow: 2px 2px 0 #000; }
  .product-img { width: 400px; height: 300px; object-fit: cover; border-radius: 20px; border: 4px solid #f5a623; margin: 20px 0; }
  .cta { background: #25d366; color: #fff; font-size: 36px; font-weight: 800; padding: 24px 60px; border-radius: 60px; margin-top: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .decor { position: absolute; font-size: 120px; opacity: 0.1; }
  .decor-1 { top: 200px; left: 30px; }
  .decor-2 { bottom: 150px; right: 30px; }
</style>
</head>
<body>
<div class="card">
  <div class="decor decor-1">🍗</div>
  <div class="decor decor-2">🔥</div>
  <div class="top-bar">
    <img class="logo" src="{{logoUrl}}" alt="El Pollón" onerror="this.style.display='none'">
    <span class="branch">{{branchName}}</span>
  </div>
  <div class="content">
    <div class="badge">Oferta Familiar</div>
    <h1 class="title">{{offerTitle}}</h1>
    <div class="price">{{price}}</div>
    {{#productImageUrl}}<img class="product-img" src="{{productImageUrl}}" alt="Producto">{{/productImageUrl}}
    <div class="cta">{{cta}}</div>
  </div>
</div>
</body>
</html>
