<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
  .card {
    width: 1080px; height: 1080px;
    background: linear-gradient(145deg, #0a2e1a 0%, #128c7e 35%, #1a1a1a 35%);
    display: flex; flex-direction: column; position: relative;
  }
  .scooter { font-size: 160px; position: absolute; top: 60px; right: 50px; opacity: 0.9; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4)); }
  .main { flex: 1; text-align: center; padding: 50px 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .delivery-badge { background: #fff; color: #128c7e; font-size: 28px; font-weight: 900; padding: 12px 40px; border-radius: 50px; margin-bottom: 24px; letter-spacing: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .title { color: #fff; font-size: 68px; font-weight: 900; line-height: 1.08; text-shadow: 3px 3px 0 rgba(0,0,0,0.5); max-width: 800px; }
  .subtitle { color: #ffcc00; font-size: 36px; font-weight: 700; margin: 18px 0; }
  .price-tag { background: {{brandColor}}; color: #fff; font-size: 52px; font-weight: 900; padding: 18px 52px; border-radius: 16px; margin: 20px auto; box-shadow: 0 6px 25px rgba(197,0,0,0.5); }
  .cta-box { background: linear-gradient(135deg, #25d366, #1ebe57); color: #fff; font-size: 30px; font-weight: 800; padding: 20px 44px; border-radius: 60px; margin-top: 24px; box-shadow: 0 6px 25px rgba(37,211,102,0.4); }
  .branch { color: rgba(255,255,255,0.85); font-size: 24px; margin-top: 16px; font-weight: 600; }
  .biz-footer { padding: 0 28px 24px; }
  .biz-footer-inner { background: rgba(10,10,10,0.92); border: 2px solid rgba(37,211,102,0.35); border-radius: 18px; padding: 18px 22px; }
  .biz-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 14px; }
  .biz-tag { background: rgba(255,255,255,0.08); color: #fff; font-size: 17px; font-weight: 600; padding: 7px 14px; border-radius: 30px; }
  .biz-ctas { display: flex; gap: 12px; }
  .biz-btn { flex: 1; text-align: center; font-size: 19px; font-weight: 800; padding: 14px 16px; border-radius: 50px; }
  .biz-btn-wa { background: #25d366; color: #fff; }
  .biz-btn-web { background: #fff; color: {{brandColor}}; }
  .biz-meta { text-align: center; color: #7dffb3; font-size: 16px; margin-top: 12px; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="scooter">🛵</div>
  <div class="main">
    <div class="delivery-badge">🚚 DELIVERY A DOMICILIO</div>
    <h1 class="title">{{offerTitle}}</h1>
    <p class="subtitle">Llega caliente a tu puerta · {{tagline}}</p>
    <div class="price-tag">{{price}}</div>
    <div class="cta-box">{{cta}}</div>
    <p class="branch">📍 {{branchName}}</p>
  </div>
  <div class="biz-footer">
    <div class="biz-footer-inner">
      <div class="biz-tags">
        <span class="biz-tag">🍗 Pollo a la Brasa</span>
        <span class="biz-tag">🚚 Delivery a Domicilio</span>
        <span class="biz-tag">📍 {{deliveryCities}}</span>
        <span class="biz-tag">⏰ {{hours}}</span>
      </div>
      <div class="biz-ctas">
        <div class="biz-btn biz-btn-wa">📱 WhatsApp · {{whatsappPhone}}</div>
        <div class="biz-btn biz-btn-web">🌐 {{websiteDisplay}}</div>
      </div>
      <div class="biz-meta">Haz tu pedido aquí: {{websiteUrl}}</div>
    </div>
  </div>
</div>
</body>
</html>
