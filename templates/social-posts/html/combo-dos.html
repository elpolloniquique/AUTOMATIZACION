<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; font-family: 'Segoe UI', Arial, sans-serif; }
  .card {
    width: 1080px; height: 1080px;
    background: #fff;
    display: grid; grid-template-rows: auto 1fr auto;
  }
  .header { background: {{brandColor}}; padding: 30px 50px; text-align: center; }
  .header h2 { color: #f5a623; font-size: 36px; font-weight: 800; }
  .header h1 { color: #fff; font-size: 56px; font-weight: 900; margin-top: 10px; }
  .body { display: flex; align-items: center; justify-content: center; padding: 40px; background: linear-gradient(180deg, #fff 0%, #fff5f5 100%); }
  .combo-box { background: #1a1a1a; border-radius: 30px; padding: 50px; text-align: center; max-width: 800px; border: 6px solid #f5a623; }
  .combo-box h3 { color: #fff; font-size: 48px; margin-bottom: 20px; }
  .combo-box .price { color: #f5a623; font-size: 80px; font-weight: 900; }
  .combo-box p { color: #ccc; font-size: 28px; margin-top: 15px; }
  .footer { background: #1a1a1a; padding: 30px; text-align: center; }
  .cta { color: #25d366; font-size: 32px; font-weight: 800; }
  .branch-tag { color: #fff; font-size: 24px; margin-top: 10px; opacity: 0.8; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h2>💑 COMBO PARA DOS</h2>
    <h1>{{offerTitle}}</h1>
  </div>
  <div class="body">
    <div class="combo-box">
      <h3>El Pollón</h3>
      <div class="price">{{price}}</div>
      <p>Pollo a la brasa + papas + ensalada</p>
    </div>
  </div>
  <div class="footer">
    <div class="cta">{{cta}}</div>
    <div class="branch-tag">📍 {{branchName}}</div>
  </div>
</div>
</body>
</html>
